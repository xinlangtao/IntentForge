openapi: 3.1.0
info:
  title: IntentForge Minimal Agent Run API
  version: nightly-SNAPSHOT
  description: Minimal HTTP and SSE contract for the event-driven coding agent MVP.
paths:
  /api/agent-runs:
    post:
      summary: Create and start one agent run
      operationId: createAgentRun
      tags:
        - agent-runs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRunCreateRequest'
      responses:
        '201':
          description: Run created and executed until the first checkpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/agent-runs/{runId}/events:
    get:
      summary: Subscribe to historical and live run events
      operationId: subscribeAgentRunEvents
      tags:
        - agent-runs
      parameters:
        - $ref: '#/components/parameters/RunId'
        - name: fromSequence
          in: query
          required: false
          description: Replay events with sequence numbers greater than this value.
          schema:
            type: integer
            format: int64
            minimum: 0
      responses:
        '200':
          description: SSE stream of run events
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events where each data payload matches AgentRunEventResponse.
        '404':
          description: Run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/agent-runs/{runId}/messages:
    post:
      summary: Resume one paused run with user feedback
      operationId: resumeAgentRun
      tags:
        - agent-runs
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRunFeedbackRequest'
      responses:
        '200':
          description: Run resumed and executed until the next checkpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunResponse'
        '404':
          description: Run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Run cannot be resumed in the current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/agent-runs/{runId}/cancel:
    post:
      summary: Cancel one run
      operationId: cancelAgentRun
      tags:
        - agent-runs
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRunCancelRequest'
      responses:
        '200':
          description: Run cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunResponse'
        '404':
          description: Run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    RunId:
      name: runId
      in: path
      required: true
      description: Stable run identifier.
      schema:
        type: string
        minLength: 1
        example: agent-run-1
  schemas:
    AgentRunCreateRequest:
      type: object
      description: Request used to create and start one agent run. When sessionId is absent the server creates a new session in the supplied space.
      required:
        - taskId
        - workspaceRoot
        - mode
        - intent
      properties:
        taskId:
          type: string
          description: Stable task identifier.
          example: task-1
        sessionId:
          type: string
          description: Optional session identifier bound to the run. When omitted, the server creates one session automatically.
          example: session-1
        spaceId:
          type: string
          description: Optional explicit space identifier. Required when sessionId is omitted so the server can place the auto-created session.
          example: application-alpha
        workspaceRoot:
          type: string
          description: Workspace root path used by tool execution.
          example: /tmp/intentforge-workspace
        mode:
          type: string
          description: Requested execution mode.
          enum:
            - PLAN_ONLY
            - IMPLEMENT_ONLY
            - REVIEW_ONLY
            - FULL
        intent:
          type: string
          description: User intent for this run.
          example: Implement event-driven agent runtime
        targetAgentId:
          type: string
          description: Optional explicit target agent identifier.
          example: intentforge.native.coder
        metadata:
          type: object
          description: Optional task metadata.
          additionalProperties:
            type: string
    AgentRunFeedbackRequest:
      type: object
      description: User feedback used to resume one paused run with an explicit next action selection.
      properties:
        content:
          type: string
          description: Optional user feedback content carried into the next turn.
          example: Please add validation details.
        nextRole:
          type: string
          description: Optional next role selected by the user when governance should choose the preferred allowed agent for that role.
          enum:
            - PLANNER
            - CODER
            - REVIEWER
            - JUDGE
          example: CODER
        nextAgentId:
          type: string
          description: Optional explicit next agent identifier selected by the user.
          example: intentforge.native.reviewer
        complete:
          type: boolean
          description: When true, the run completes at the current checkpoint instead of executing another agent.
          default: false
      oneOf:
        - required:
            - nextRole
        - required:
            - nextAgentId
        - required:
            - complete
          properties:
            complete:
              const: true
    AgentRunCancelRequest:
      type: object
      description: Cancellation request for one run.
      required:
        - reason
      properties:
        reason:
          type: string
          description: Reason used to cancel the run.
          example: User stopped the run.
    AgentRunResponse:
      type: object
      description: Latest run snapshot returned by create, resume, and cancel operations.
      required:
        - runId
        - taskId
        - sessionId
        - status
        - nextStepIndex
        - eventsPath
        - selectedRuntimes
        - selectedRouteSteps
        - availableNextActions
        - events
      properties:
        runId:
          type: string
          description: Stable run identifier.
          example: agent-run-1
        taskId:
          type: string
          description: Task identifier.
          example: task-1
        sessionId:
          type: string
          description: Session identifier associated with the run. This value may be auto-generated by the server when the request omits sessionId.
          example: session-1
        status:
          type: string
          description: Current run status.
          enum:
            - RUNNING
            - AWAITING_USER
            - COMPLETED
            - CANCELLED
            - FAILED
        nextStepIndex:
          type: integer
          format: int32
          minimum: 0
          description: Zero-based index of the next stage to execute.
          example: 1
        awaitingReason:
          type: string
          description: Optional human-readable reason shown when the run pauses.
          example: awaiting user feedback before continuing to CODER
        eventsPath:
          type: string
          description: Relative SSE path used to subscribe to run events.
          example: /api/agent-runs/agent-run-1/events
        selectedRuntimes:
          type: array
          description: Runtime implementations selected for the current run.
          items:
            $ref: '#/components/schemas/RuntimeImplementationResponse'
        selectedRouteSteps:
          type: array
          description: Route steps already chosen and executed or scheduled for this run.
          items:
            $ref: '#/components/schemas/AgentRouteStepResponse'
        availableNextActions:
          type: array
          description: User-selectable next actions visible when the run is paused at a checkpoint.
          items:
            $ref: '#/components/schemas/AgentRunActionResponse'
        events:
          type: array
          description: Ordered run events known at the time of the response.
          items:
            $ref: '#/components/schemas/AgentRunEventResponse'
    AgentRouteStepResponse:
      type: object
      description: One selected route step already attached to the current run.
      required:
        - order
        - agentId
        - role
        - reason
      properties:
        order:
          type: integer
          format: int32
          minimum: 1
          description: One-based step order inside the selected route history.
          example: 1
        agentId:
          type: string
          description: Selected agent identifier.
          example: intentforge.native.planner
        role:
          type: string
          description: Selected agent role.
          enum:
            - PLANNER
            - CODER
            - REVIEWER
            - JUDGE
          example: PLANNER
        reason:
          type: string
          description: Human-readable explanation of why this step was selected.
          example: initial planner step selected from task mode
    AgentRunActionResponse:
      type: object
      description: One user-selectable next action visible at a paused checkpoint.
      required:
        - preferred
        - complete
        - reason
      properties:
        agentId:
          type:
            - string
            - 'null'
          description: Target agent identifier when the action continues execution with one agent, otherwise null for completion.
          example: intentforge.native.coder
        role:
          type:
            - string
            - 'null'
          description: Target role when the action continues execution with one agent, otherwise null for completion.
          enum:
            - PLANNER
            - CODER
            - REVIEWER
            - JUDGE
            - null
          example: CODER
        preferred:
          type: boolean
          description: Whether governance marks this action as the preferred default at the current checkpoint.
          example: true
        complete:
          type: boolean
          description: Whether this action completes the run without executing another agent.
          example: false
        reason:
          type: string
          description: Human-readable rationale shown to the caller.
          example: preferred next action for task mode FULL
    RuntimeImplementationResponse:
      type: object
      description: One runtime implementation selected for the current run.
      required:
        - id
        - capability
        - displayName
      properties:
        id:
          type: string
          description: Stable runtime implementation identifier.
          example: intentforge.prompt.manager.in-memory
        capability:
          type: string
          description: Runtime capability name.
          example: PROMPT_MANAGER
        displayName:
          type: string
          description: Human-readable implementation name.
          example: In-Memory Prompt Manager
        version:
          type: string
          description: Implementation version text.
          example: nightly-SNAPSHOT
        implementationClass:
          type: string
          description: Concrete implementation class name.
          example: cn.intentforge.prompt.local.registry.InMemoryPromptManager
        metadata:
          type: object
          description: Additional implementation metadata.
          additionalProperties:
            type: string
    AgentRunEventResponse:
      type: object
      description: One run event payload used in HTTP responses and SSE data blocks.
      required:
        - runId
        - sequence
        - type
        - status
        - message
        - metadata
        - createdAt
      properties:
        runId:
          type: string
          description: Target run identifier.
          example: agent-run-1
        sequence:
          type: integer
          format: int64
          minimum: 1
          description: Ordered event sequence number.
          example: 1
        type:
          type: string
          description: Event type emitted by the run lifecycle.
          enum:
            - RUN_CREATED
            - CONTEXT_RESOLVED
            - ROUTE_SELECTED
            - STAGE_STARTED
            - STAGE_COMPLETED
            - USER_FEEDBACK_RECEIVED
            - RUN_RESUMED
            - AWAITING_USER
            - RUN_COMPLETED
            - RUN_CANCELLED
            - RUN_FAILED
        status:
          type: string
          description: Run status at the time of the event.
          enum:
            - RUNNING
            - AWAITING_USER
            - COMPLETED
            - CANCELLED
            - FAILED
        message:
          type: string
          description: Short event message.
          example: run created
        metadata:
          type: object
          description: Event metadata.
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
          description: Event creation timestamp.
          example: '2026-03-12T13:00:00Z'
    ErrorResponse:
      type: object
      description: Minimal error payload.
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable error code.
          example: AGENT_RUN_NOT_FOUND
        message:
          type: string
          description: Human-readable error message.
          example: 'run not found: agent-run-1'
